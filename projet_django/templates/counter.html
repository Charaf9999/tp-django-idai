{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat du compteur</title>
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>
<body>
    <main class="container page-center">
        <div class="card narrow">
            <h2>Résultat du compteur</h2>
            <p><strong>Nombre de mots :</strong> {{ amount }}</p>
            <p><strong>Texte saisi :</strong></p>
            <div class="result-box">{{ text }}</div>
            <a class="button-link" href="{% url 'index' %}">Retour à l'accueil</a>
        </div>
    </main>
</body>
</html>
